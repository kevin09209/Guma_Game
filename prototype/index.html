<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gumayuwei 搞笑戀愛模擬器｜Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 遊戲主畫面容器：所有畫面（開始、事件、結局）都畫在這裡面 -->
  <div id="game">

    <!-- ===== 開始畫面 ===== -->
    <section id="screen-start" class="screen">
      <div class="start-box">
        <p class="start-tag">搞笑戀愛模擬器</p>
        <h1 class="start-title">Gumayuwei<br />約會模擬器</h1>
        <p class="start-subtitle">— 公司茶水間篇（Demo）—</p>
        <p class="start-desc">
          你是 Gumayuwei，一位在台北上班、看起來厭世但意外有迷因魅力的普通男子。<br />
          面對理性吐槽系同事，你唯一的武器是——手上的道具卡。<br />
          不用選出完美答案，用最荒謬的方式推進戀愛吧。
        </p>
        <button id="btn-start" class="btn btn-primary">開始上班（開始遊戲）</button>
      </div>
    </section>

    <!-- ===== 事件畫面 ===== -->
    <section id="screen-event" class="screen hidden">

      <!-- 上方：場景資訊與數值面板 -->
      <header class="topbar">
        <div class="scene-info">
          <span id="event-progress" class="badge">事件 1 / 3</span>
          <span id="event-location" class="badge badge-location">公司茶水間</span>
        </div>
        <!-- 六個核心數值，由 main.js 動態產生 -->
        <div id="stats-panel" class="stats-panel"></div>
      </header>

      <!-- 中間：劇情對話區 -->
      <main class="stage">
        <h2 id="event-title" class="event-title"></h2>
        <p id="event-intro" class="event-intro"></p>

        <!-- 女主角的台詞框 -->
        <div class="dialog dialog-heroine">
          <div class="dialog-name" id="heroine-name">林知夏</div>
          <p id="heroine-line" class="dialog-text"></p>
        </div>

        <!-- 使用卡片後的演出結果（平常隱藏） -->
        <div id="result-box" class="result-box hidden">
          <div class="dialog dialog-guma">
            <div class="dialog-name">Gumayuwei</div>
            <p id="result-narration" class="dialog-text"></p>
          </div>
          <div class="dialog dialog-heroine">
            <div class="dialog-name">林知夏</div>
            <p id="result-reaction" class="dialog-text"></p>
          </div>
          <!-- 這次選擇造成的數值變化摘要 -->
          <div id="result-effects" class="result-effects"></div>
          <button id="btn-next" class="btn btn-primary">繼續 ▶</button>
        </div>
      </main>

      <!-- 下方：手牌區（點卡片出牌） -->
      <footer id="hand-area" class="hand-area">
        <p class="hand-hint">選擇一張道具卡，操控 Gumayuwei 的反應：</p>
        <div id="hand" class="hand"></div>
      </footer>
    </section>

    <!-- ===== 結局畫面 ===== -->
    <section id="screen-ending" class="screen hidden">
      <div class="ending-box">
        <p class="start-tag">— 結局 —</p>
        <h1 id="ending-title" class="ending-title"></h1>
        <p id="ending-text" class="ending-text"></p>
        <div id="ending-stats" class="ending-stats"></div>
        <button id="btn-restart" class="btn btn-primary">再來一次</button>
      </div>
    </section>

  </div>

  <script src="main.js"></script>
</body>
</html>
