# 把遊戲部署到 GitHub Pages，讓手機直接用網址遊玩。
# 做法：把整個 repo（純靜態網站）發佈到 gh-pages 分支。
# GitHub 偵測到 gh-pages 分支會自動開啟 Pages，不需要手動進設定頁。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/new-session-uexrwe"]
  workflow_dispatch: {}

permissions:
  contents: write # 需要寫入權限才能推送 gh-pages 分支

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github"
