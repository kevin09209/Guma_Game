# 把遊戲部署到 GitHub Pages，讓手機直接用網址遊玩。
# 推送到 main 或開發分支時自動部署整個 repo（純靜態網站，不需要編譯）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/new-session-uexrwe"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true # 若 Pages 尚未開啟，嘗試自動開啟
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
