<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 1100">
  <!-- Gumayuwei 剪影暫代圖：依企劃書外貌設定——圓臉、臉頰有份量感、厚下巴、
       微亂中分瀏海、微駝背的厭世上班族輪廓。
       之後換成正式立繪時，直接用同名檔案覆蓋即可。 -->
  <defs>
    <linearGradient id="gbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e5a4e"/>
      <stop offset="1" stop-color="#4e3f36"/>
    </linearGradient>
  </defs>
  <g fill="url(#gbody)">
    <!-- 頭髮（黑短髮，輪廓故意有點亂） -->
    <path d="M250 68 q -104 0 -112 108 q -3 40 4 74 l 216 0 q 7 -34 4 -74 Q 354 68 250 68 z"/>
    <!-- 臉（圓臉、臉頰寬、厚下巴：下半部特別飽滿） -->
    <path d="M250 110 q -96 0 -100 100 q -2 56 20 92 q 26 44 80 44 q 54 0 80 -44 q 22 -36 20 -92 q -4 -100 -100 -100 z" fill="#7d685a"/>
    <!-- 微亂中分瀏海 -->
    <path d="M250 100 q -88 0 -92 96 q 20 -36 42 -40 q -6 22 2 34 q 14 -34 48 -38 q 34 4 48 38 q 8 -12 2 -34 q 22 4 42 40 q -4 -96 -92 -96 z"/>
    <!-- 厚下巴的份量感 -->
    <path d="M186 300 q 64 34 128 0 q -18 40 -64 40 q -46 0 -64 -40 z" fill="#6e5a4e"/>
    <!-- 脖子（短而厚實） -->
    <rect x="222" y="330" width="56" height="46"/>
    <!-- 身體（鬆垮襯衫、微駝背的社畜輪廓） -->
    <path d="M250 368 q -78 0 -108 52 q -34 60 -38 156 l 32 8 q 8 -64 24 -100 l -6 266 q 46 24 96 24 q 50 0 96 -24 l -6 -266 q 16 36 24 100 l 32 -8 q -4 -96 -38 -156 q -30 -52 -108 -52 z"/>
    <!-- 手臂（無力下垂＝厭世感） -->
    <path d="M148 452 q -22 80 -8 160 l 34 90 l 28 -14 l -26 -86 q -4 -80 -6 -140 z"/>
    <path d="M352 452 q 22 80 8 160 l -34 90 l -28 -14 l 26 -86 q 4 -80 6 -140 z"/>
    <!-- 褲子與腿 -->
    <path d="M170 748 l 160 0 l 8 80 l -176 0 z"/>
    <rect x="188" y="826" width="52" height="238" rx="14"/>
    <rect x="260" y="826" width="52" height="238" rx="14"/>
  </g>
  <!-- 領帶（歪的，增加辨識度與微妙的不可靠感） -->
  <path d="M250 380 l 18 30 l -10 96 l -16 8 l -12 -100 z" fill="#8a5f52" transform="rotate(4 250 420)"/>
</svg>
