<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 1100">
  <!-- 女主角 A（理性吐槽系同事）剪影暫代圖。
       之後換成正式立繪時，直接用同名檔案覆蓋即可（建議直式、去背 PNG/SVG）。 -->
  <defs>
    <linearGradient id="hbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a5a78"/>
      <stop offset="1" stop-color="#333f58"/>
    </linearGradient>
  </defs>
  <g fill="url(#hbody)">
    <!-- 頭髮（及肩直髮＋側分瀏海） -->
    <path d="M250 60 q -108 0 -118 118 q -6 78 6 150 q -26 24 -20 56 q 30 -10 44 -34 l 176 0 q 14 24 44 34 q 6 -32 -20 -56 q 12 -72 6 -150 Q 358 60 250 60 z"/>
    <!-- 臉 -->
    <ellipse cx="250" cy="200" rx="86" ry="96" fill="#5d6d8e"/>
    <!-- 瀏海 -->
    <path d="M250 92 q -92 0 -96 104 q 40 -44 96 -44 q 56 0 96 44 q -4 -104 -96 -104 z"/>
    <!-- 脖子 -->
    <rect x="228" y="286" width="44" height="52"/>
    <!-- 身體（襯衫＋窄裙的上班族輪廓） -->
    <path d="M250 330 q -66 0 -96 44 q -36 52 -42 150 l 30 10 q 8 -60 26 -96 l -8 250 q 44 26 90 26 q 46 0 90 -26 l -8 -250 q 18 36 26 96 l 30 -10 q -6 -98 -42 -150 q -30 -44 -96 -44 z"/>
    <!-- 手臂（抱胸姿勢） -->
    <path d="M158 420 q -18 60 8 96 l 84 44 l 0 -36 l -60 -44 q -10 -30 -32 -60 z"/>
    <path d="M342 420 q 18 60 -8 96 l -84 44 l 0 -36 l 60 -44 q 10 -30 32 -60 z"/>
    <!-- 裙子與腿 -->
    <path d="M172 690 l 156 0 l 14 130 l -184 0 z"/>
    <rect x="196" y="820" width="40" height="240" rx="14"/>
    <rect x="264" y="820" width="40" height="240" rx="14"/>
  </g>
  <!-- 領口小點綴，增加辨識度 -->
  <circle cx="250" cy="352" r="10" fill="#7f93b8"/>
</svg>
