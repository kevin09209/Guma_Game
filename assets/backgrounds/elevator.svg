<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 公司電梯口：傍晚冷色調走廊 -->
  <defs>
    <linearGradient id="ewall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8cdd8"/>
      <stop offset="1" stop-color="#aab1c0"/>
    </linearGradient>
    <linearGradient id="efloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a8f9e"/>
      <stop offset="1" stop-color="#6e7382"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8bfc9"/>
      <stop offset="0.5" stop-color="#dde2e8"/>
      <stop offset="1" stop-color="#b8bfc9"/>
    </linearGradient>
  </defs>

  <!-- 牆與地板 -->
  <rect width="1600" height="640" fill="url(#ewall)"/>
  <rect y="640" width="1600" height="260" fill="url(#efloor)"/>

  <!-- 地板反光線 -->
  <line x1="0" y1="700" x2="1600" y2="700" stroke="#ffffff" stroke-width="3" opacity="0.25"/>
  <line x1="0" y1="790" x2="1600" y2="790" stroke="#ffffff" stroke-width="3" opacity="0.15"/>

  <!-- 電梯（中央偏左） -->
  <rect x="480" y="110" width="420" height="540" rx="8" fill="#7d8494"/>
  <rect x="505" y="140" width="370" height="510" fill="#4d5261"/>
  <rect x="510" y="145" width="178" height="505" fill="url(#door)"/>
  <rect x="692" y="145" width="178" height="505" fill="url(#door)"/>
  <line x1="690" y1="145" x2="690" y2="650" stroke="#3a3e4a" stroke-width="6"/>

  <!-- 樓層顯示器：卡在 12 樓 -->
  <rect x="600" y="60" width="180" height="46" rx="8" fill="#1e222c"/>
  <text x="690" y="94" font-family="monospace" font-size="34" fill="#ff7847" text-anchor="middle">▼ 12</text>

  <!-- 按鈕面板 -->
  <rect x="930" y="330" width="56" height="150" rx="10" fill="#dde2e8"/>
  <circle cx="958" cy="375" r="15" fill="#f7f9fa" stroke="#9aa1ad" stroke-width="3"/>
  <circle cx="958" cy="430" r="15" fill="#ffd34d" stroke="#c9a020" stroke-width="3"/>

  <!-- 右側窗戶：傍晚天色 -->
  <rect x="1150" y="120" width="360" height="420" rx="10" fill="#e8a06a"/>
  <rect x="1150" y="120" width="360" height="200" rx="10" fill="#f2c184"/>
  <rect x="1150" y="120" width="360" height="420" rx="10" fill="none" stroke="#ffffff" stroke-width="14"/>
  <line x1="1330" y1="128" x2="1330" y2="532" stroke="#ffffff" stroke-width="10"/>
  <!-- 遠方城市剪影 -->
  <path d="M1160 420 h60 v-90 h44 v50 h50 v-130 h46 v90 h52 v-50 h48 v130 h60 v-60 h50 v170 h-410 z" fill="#8a5f4a" opacity="0.7"/>
  <circle cx="1250" cy="200" r="34" fill="#ffe9b8" opacity="0.9"/>

  <!-- 左側盆栽 -->
  <rect x="150" y="560" width="110" height="90" rx="10" fill="#8a6a4e"/>
  <path d="M205 560 q -70 -60 -30 -140 q 40 50 30 140 z" fill="#5f8a55"/>
  <path d="M205 560 q 70 -70 30 -150 q -44 55 -30 150 z" fill="#6f9a63"/>
  <path d="M205 560 q -6 -90 0 -160 q 14 80 0 160 z" fill="#79a86d"/>

  <!-- 逃生指示燈 -->
  <rect x="60" y="150" width="150" height="56" rx="8" fill="#2f7d4f"/>
  <text x="135" y="188" font-family="sans-serif" font-size="28" fill="#eafff2" text-anchor="middle">EXIT →</text>
</svg>
