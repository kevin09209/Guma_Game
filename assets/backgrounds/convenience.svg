<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 公司樓下便利商店：明亮的日光燈與貨架 -->
  <defs>
    <linearGradient id="cwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f2"/>
      <stop offset="1" stop-color="#dde3da"/>
    </linearGradient>
    <linearGradient id="cfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd6cf"/>
      <stop offset="1" stop-color="#aeb6ae"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="620" fill="url(#cwall)"/>
  <rect y="620" width="1600" height="280" fill="url(#cfloor)"/>
  <!-- 地板格線 -->
  <g stroke="#9aa39a" stroke-width="3" opacity="0.5">
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="260" y1="620" x2="140" y2="900"/>
    <line x1="800" y1="620" x2="800" y2="900"/>
    <line x1="1340" y1="620" x2="1460" y2="900"/>
  </g>

  <!-- 招牌色帶（綠橘紅，便利商店的既視感） -->
  <rect x="0" y="30" width="1600" height="26" fill="#2f8a55"/>
  <rect x="0" y="56" width="1600" height="26" fill="#f2a13c"/>
  <rect x="0" y="82" width="1600" height="26" fill="#e8654f"/>

  <!-- 左側貨架 -->
  <rect x="80" y="200" width="420" height="440" rx="8" fill="#d8dee6"/>
  <g fill="#b9c2cc">
    <rect x="100" y="240" width="380" height="14"/>
    <rect x="100" y="360" width="380" height="14"/>
    <rect x="100" y="480" width="380" height="14"/>
  </g>
  <!-- 貨架上的商品（彩色小方塊） -->
  <g>
    <rect x="110" y="264" width="52" height="80" rx="6" fill="#e8654f"/>
    <rect x="172" y="274" width="52" height="70" rx="6" fill="#5a8fb8"/>
    <rect x="234" y="264" width="52" height="80" rx="6" fill="#f2c14e"/>
    <rect x="296" y="280" width="52" height="64" rx="6" fill="#79a86d"/>
    <rect x="358" y="268" width="52" height="76" rx="6" fill="#a86da8"/>
    <rect x="110" y="390" width="60" height="74" rx="6" fill="#5a8fb8"/>
    <rect x="180" y="400" width="60" height="64" rx="6" fill="#f2a13c"/>
    <rect x="250" y="390" width="60" height="74" rx="6" fill="#e8654f"/>
    <rect x="320" y="404" width="60" height="60" rx="6" fill="#79a86d"/>
    <rect x="110" y="508" width="80" height="116" rx="6" fill="#c9b18c"/>
    <rect x="200" y="520" width="80" height="104" rx="6" fill="#aab2b9"/>
    <rect x="290" y="508" width="80" height="116" rx="6" fill="#8fb8d8"/>
  </g>

  <!-- 中央冰櫃（冰棒事件的案發現場） -->
  <rect x="620" y="330" width="360" height="310" rx="10" fill="#dfe8ee"/>
  <rect x="640" y="350" width="150" height="230" rx="8" fill="#bfe0f0"/>
  <rect x="810" y="350" width="150" height="230" rx="8" fill="#bfe0f0"/>
  <line x1="800" y1="340" x2="800" y2="640" stroke="#aab8c2" stroke-width="6"/>
  <rect x="700" y="440" width="14" height="60" rx="6" fill="#7d8a94"/>
  <rect x="886" y="440" width="14" height="60" rx="6" fill="#7d8a94"/>
  <text x="800" y="320" font-family="sans-serif" font-size="30" font-weight="700" fill="#5a8fb8" text-anchor="middle">ICE</text>

  <!-- 右側關東煮櫃檯 -->
  <rect x="1100" y="430" width="420" height="210" rx="10" fill="#b98f68"/>
  <rect x="1130" y="380" width="360" height="60" rx="8" fill="#e8e0d0"/>
  <rect x="1150" y="396" width="90" height="30" rx="4" fill="#8a5f4a"/>
  <rect x="1260" y="396" width="90" height="30" rx="4" fill="#8a5f4a"/>
  <rect x="1370" y="396" width="90" height="30" rx="4" fill="#8a5f4a"/>
  <!-- 蒸氣 -->
  <g stroke="#ffffff" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M 1200 360 q 12 -26 0 -50"/>
    <path d="M 1300 366 q -12 -28 0 -54"/>
    <path d="M 1400 360 q 12 -26 0 -50"/>
  </g>

  <!-- 日光燈 -->
  <rect x="200" y="130" width="360" height="14" rx="7" fill="#ffffff"/>
  <rect x="700" y="130" width="360" height="14" rx="7" fill="#ffffff"/>
  <rect x="1200" y="130" width="300" height="14" rx="7" fill="#ffffff"/>
</svg>
