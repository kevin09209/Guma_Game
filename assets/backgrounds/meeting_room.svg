<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 公司會議室：白天、冷靜的簡報空間 -->
  <defs>
    <linearGradient id="mwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8ebf0"/>
      <stop offset="1" stop-color="#ccd2dc"/>
    </linearGradient>
    <linearGradient id="mfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa0ae"/>
      <stop offset="1" stop-color="#7d8290"/>
    </linearGradient>
    <linearGradient id="mtable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9b18c"/>
      <stop offset="1" stop-color="#a88f6a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="640" fill="url(#mwall)"/>
  <rect y="640" width="1600" height="260" fill="url(#mfloor)"/>

  <!-- 投影布幕與簡報 -->
  <rect x="560" y="70" width="480" height="40" rx="8" fill="#aab2be"/>
  <rect x="590" y="110" width="420" height="270" rx="6" fill="#f7f9fb"/>
  <rect x="620" y="140" width="220" height="24" rx="6" fill="#5a8fb8"/>
  <rect x="620" y="186" width="330" height="10" rx="5" fill="#c4ccd6"/>
  <rect x="620" y="208" width="300" height="10" rx="5" fill="#c4ccd6"/>
  <rect x="620" y="230" width="315" height="10" rx="5" fill="#c4ccd6"/>
  <!-- 簡報上不太妙的下跌折線 -->
  <polyline points="630,340 690,300 750,320 810,270 870,330 930,290" fill="none" stroke="#e8654f" stroke-width="6" stroke-linecap="round"/>

  <!-- 側窗與百葉簾 -->
  <rect x="90" y="100" width="320" height="380" rx="8" fill="#cfe3ef"/>
  <g stroke="#f2f5f8" stroke-width="12">
    <line x1="98" y1="150" x2="402" y2="150"/>
    <line x1="98" y1="210" x2="402" y2="210"/>
    <line x1="98" y1="270" x2="402" y2="270"/>
    <line x1="98" y1="330" x2="402" y2="330"/>
    <line x1="98" y1="390" x2="402" y2="390"/>
  </g>
  <rect x="90" y="100" width="320" height="380" rx="8" fill="none" stroke="#ffffff" stroke-width="12"/>

  <!-- 長會議桌 -->
  <path d="M 200 700 L 1400 700 L 1300 590 L 300 590 Z" fill="url(#mtable)"/>
  <rect x="300" y="700" width="40" height="140" fill="#8a7354"/>
  <rect x="1260" y="700" width="40" height="140" fill="#8a7354"/>

  <!-- 桌上的筆電與文件 -->
  <path d="M 480 588 l 90 0 l 10 -52 l -90 0 z" fill="#3a3f47"/>
  <rect x="470" y="588" width="112" height="10" rx="4" fill="#20242a"/>
  <rect x="700" y="560" width="130" height="20" rx="3" fill="#f2efe6" transform="rotate(-3 765 570)"/>
  <rect x="712" y="540" width="130" height="20" rx="3" fill="#e8e4d6" transform="rotate(2 777 550)"/>
  <path d="M 1050 588 l 90 0 l 10 -52 l -90 0 z" fill="#3a3f47"/>
  <rect x="1040" y="588" width="112" height="10" rx="4" fill="#20242a"/>
  <!-- 桌上的馬克杯 -->
  <rect x="930" y="556" width="34" height="32" rx="6" fill="#e8654f"/>

  <!-- 椅子剪影 -->
  <g fill="#5a6070">
    <rect x="420" y="620" width="120" height="18" rx="8"/>
    <rect x="465" y="638" width="26" height="90"/>
    <rect x="900" y="620" width="120" height="18" rx="8"/>
    <rect x="945" y="638" width="26" height="90"/>
  </g>

  <!-- 天花板燈 -->
  <rect x="300" y="0" width="300" height="14" rx="7" fill="#f2f5f8"/>
  <rect x="1000" y="0" width="300" height="14" rx="7" fill="#f2f5f8"/>
</svg>
