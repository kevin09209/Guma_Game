<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 辦公室：加班時段的夜色 -->
  <defs>
    <linearGradient id="owall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3350"/>
      <stop offset="1" stop-color="#3a4266"/>
    </linearGradient>
    <linearGradient id="ofloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c3a52"/>
      <stop offset="1" stop-color="#2c2a3e"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2038"/>
      <stop offset="1" stop-color="#453763"/>
    </linearGradient>
  </defs>

  <!-- 牆與地板 -->
  <rect width="1600" height="620" fill="url(#owall)"/>
  <rect y="620" width="1600" height="280" fill="url(#ofloor)"/>

  <!-- 整面落地窗：夜景 -->
  <rect x="120" y="60" width="1360" height="440" rx="8" fill="url(#sky)"/>
  <!-- 城市燈火 -->
  <g fill="#ffd985" opacity="0.85">
    <rect x="200" y="330" width="90" height="170"/>
    <rect x="330" y="270" width="70" height="230"/>
    <rect x="440" y="360" width="110" height="140"/>
    <rect x="600" y="240" width="80" height="260"/>
    <rect x="720" y="320" width="100" height="180"/>
    <rect x="870" y="280" width="70" height="220"/>
    <rect x="980" y="350" width="120" height="150"/>
    <rect x="1140" y="250" width="80" height="250"/>
    <rect x="1260" y="330" width="100" height="170"/>
  </g>
  <!-- 大樓暗面與窗點 -->
  <g fill="#141a2e">
    <rect x="200" y="330" width="90" height="170" opacity="0.55"/>
    <rect x="440" y="360" width="110" height="140" opacity="0.5"/>
    <rect x="720" y="320" width="100" height="180" opacity="0.55"/>
    <rect x="980" y="350" width="120" height="150" opacity="0.5"/>
    <rect x="1260" y="330" width="100" height="170" opacity="0.55"/>
  </g>
  <g fill="#ffe9b8">
    <rect x="345" y="290" width="12" height="10"/><rect x="370" y="290" width="12" height="10"/>
    <rect x="345" y="320" width="12" height="10"/><rect x="615" y="260" width="12" height="10"/>
    <rect x="640" y="290" width="12" height="10"/><rect x="885" y="300" width="12" height="10"/>
    <rect x="1155" y="270" width="12" height="10"/><rect x="1180" y="300" width="12" height="10"/>
    <rect x="1155" y="330" width="12" height="10"/>
  </g>
  <!-- 月亮 -->
  <circle cx="1380" cy="140" r="36" fill="#f4ecd4"/>
  <circle cx="1362" cy="130" r="30" fill="url(#sky)"/>
  <!-- 窗框 -->
  <rect x="120" y="60" width="1360" height="440" rx="8" fill="none" stroke="#4d5578" stroke-width="12"/>
  <line x1="575" y1="66" x2="575" y2="494" stroke="#4d5578" stroke-width="8"/>
  <line x1="1030" y1="66" x2="1030" y2="494" stroke="#4d5578" stroke-width="8"/>

  <!-- 辦公桌左 -->
  <rect x="80" y="560" width="520" height="26" rx="8" fill="#6a5a7a"/>
  <rect x="110" y="586" width="26" height="150" fill="#544766"/>
  <rect x="540" y="586" width="26" height="150" fill="#544766"/>
  <!-- 螢幕（還亮著，因為要加班） -->
  <rect x="180" y="430" width="220" height="130" rx="8" fill="#20242e"/>
  <rect x="192" y="442" width="196" height="106" fill="#9fd0e8"/>
  <rect x="270" y="560" width="40" height="14" fill="#20242e"/>
  <rect x="240" y="574" width="100" height="8" rx="4" fill="#20242e"/>
  <!-- 鍵盤與那份該死的報表 -->
  <rect x="200" y="590" width="170" height="16" rx="6" fill="#454a58"/>
  <rect x="420" y="540" width="130" height="18" rx="3" fill="#f2efe6" transform="rotate(-4 485 549)"/>
  <rect x="430" y="520" width="130" height="18" rx="3" fill="#e8e4d6" transform="rotate(3 495 529)"/>

  <!-- 辦公桌右 -->
  <rect x="1000" y="560" width="520" height="26" rx="8" fill="#6a5a7a"/>
  <rect x="1030" y="586" width="26" height="150" fill="#544766"/>
  <rect x="1460" y="586" width="26" height="150" fill="#544766"/>
  <rect x="1120" y="430" width="220" height="130" rx="8" fill="#20242e"/>
  <rect x="1132" y="442" width="196" height="106" fill="#3a4152"/>
  <rect x="1210" y="560" width="40" height="14" fill="#20242e"/>
  <!-- 桌上的包包（她本來要下班的） -->
  <path d="M1390 500 q 0 -26 30 -26 q 30 0 30 26 l 8 60 h -76 z" fill="#a8657a"/>
  <path d="M1405 486 q 15 -24 30 0" fill="none" stroke="#8a4f62" stroke-width="8"/>

  <!-- 天花板燈（只剩一盞亮著） -->
  <rect x="620" y="0" width="360" height="18" rx="8" fill="#e8e8dd"/>
  <polygon points="620,18 980,18 1120,320 480,320" fill="#fff7d6" opacity="0.10"/>
</svg>
