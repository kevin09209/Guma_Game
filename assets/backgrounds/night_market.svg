<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 台北夜市：燈籠、攤販、熱鬧的夜色 -->
  <defs>
    <linearGradient id="nsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2038"/>
      <stop offset="1" stop-color="#3c3050"/>
    </linearGradient>
    <linearGradient id="nroad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4258"/>
      <stop offset="1" stop-color="#332e40"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="620" fill="url(#nsky)"/>
  <rect y="620" width="1600" height="280" fill="url(#nroad)"/>

  <!-- 兩排燈籠串 -->
  <path d="M 0 90 Q 800 150 1600 90" fill="none" stroke="#2c2438" stroke-width="6"/>
  <g>
    <g fill="#e8654f">
      <ellipse cx="150" cy="130" rx="34" ry="42"/>
      <ellipse cx="450" cy="152" rx="34" ry="42"/>
      <ellipse cx="750" cy="162" rx="34" ry="42"/>
      <ellipse cx="1050" cy="156" rx="34" ry="42"/>
      <ellipse cx="1350" cy="136" rx="34" ry="42"/>
    </g>
    <g fill="#ffd985">
      <ellipse cx="300" cy="146" rx="30" ry="38"/>
      <ellipse cx="600" cy="160" rx="30" ry="38"/>
      <ellipse cx="900" cy="162" rx="30" ry="38"/>
      <ellipse cx="1200" cy="148" rx="30" ry="38"/>
      <ellipse cx="1500" cy="120" rx="30" ry="38"/>
    </g>
    <ellipse cx="750" cy="162" rx="20" ry="26" fill="#ff8a70" opacity="0.9"/>
  </g>

  <!-- 左側攤位：鹽酥雞 -->
  <rect x="60" y="300" width="440" height="60" rx="8" fill="#a83c3c"/>
  <text x="280" y="344" font-family="'PingFang TC','Noto Sans TC',sans-serif" font-size="36" font-weight="700" fill="#ffe9b8" text-anchor="middle">鹽酥雞</text>
  <rect x="80" y="360" width="400" height="200" fill="#5a4632"/>
  <rect x="100" y="380" width="360" height="90" rx="8" fill="#e8c46a"/>
  <g fill="#c98a3c">
    <circle cx="150" cy="420" r="18"/><circle cx="200" cy="430" r="16"/><circle cx="250" cy="416" r="18"/>
    <circle cx="300" cy="428" r="16"/><circle cx="350" cy="418" r="18"/><circle cx="410" cy="426" r="16"/>
  </g>
  <rect x="80" y="560" width="400" height="80" fill="#4a3826"/>
  <g stroke="#ffffff" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M 200 372 q 12 -26 0 -50"/>
    <path d="M 320 372 q -12 -26 0 -50"/>
  </g>

  <!-- 右側攤位：射氣球 -->
  <rect x="1100" y="300" width="440" height="60" rx="8" fill="#3c6ea8"/>
  <text x="1320" y="344" font-family="'PingFang TC','Noto Sans TC',sans-serif" font-size="36" font-weight="700" fill="#e2f0ff" text-anchor="middle">射氣球</text>
  <rect x="1120" y="360" width="400" height="200" fill="#2c4a6e"/>
  <g>
    <circle cx="1180" cy="420" r="22" fill="#e8654f"/>
    <circle cx="1240" cy="400" r="22" fill="#f2c14e"/>
    <circle cx="1300" cy="424" r="22" fill="#79a86d"/>
    <circle cx="1360" cy="402" r="22" fill="#a86da8"/>
    <circle cx="1420" cy="420" r="22" fill="#5a8fb8"/>
    <circle cx="1480" cy="404" r="22" fill="#e8935a"/>
  </g>
  <rect x="1120" y="470" width="400" height="16" fill="#1e3450"/>
  <rect x="1120" y="560" width="400" height="80" fill="#1a2c44"/>

  <!-- 中央遠處的攤販燈與人潮剪影 -->
  <g fill="#ffd985" opacity="0.85">
    <rect x="600" y="380" width="90" height="60" rx="6"/>
    <rect x="720" y="370" width="90" height="70" rx="6"/>
    <rect x="840" y="382" width="90" height="58" rx="6"/>
  </g>
  <g fill="#241f30">
    <ellipse cx="640" cy="560" rx="30" ry="60"/>
    <circle cx="640" cy="486" r="20"/>
    <ellipse cx="730" cy="570" rx="26" ry="52"/>
    <circle cx="730" cy="504" r="18"/>
    <ellipse cx="850" cy="562" rx="30" ry="58"/>
    <circle cx="850" cy="490" r="20"/>
    <ellipse cx="950" cy="572" rx="24" ry="48"/>
    <circle cx="950" cy="512" r="17"/>
  </g>

  <!-- 地面反光 -->
  <ellipse cx="760" cy="700" rx="300" ry="20" fill="#ffd985" opacity="0.10"/>
  <ellipse cx="280" cy="740" rx="200" ry="16" fill="#e8654f" opacity="0.10"/>
  <ellipse cx="1320" cy="740" rx="200" ry="16" fill="#5a8fb8" opacity="0.12"/>
</svg>
