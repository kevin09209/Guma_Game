<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- 台北夜晚街頭：捷運站前，告白時刻的路燈與夜色 -->
  <defs>
    <linearGradient id="ssky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a30"/>
      <stop offset="1" stop-color="#2c2a48"/>
    </linearGradient>
    <linearGradient id="sroad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3648"/>
      <stop offset="1" stop-color="#282534"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="640" fill="url(#ssky)"/>
  <rect y="640" width="1600" height="260" fill="url(#sroad)"/>

  <!-- 月亮與星星 -->
  <circle cx="1300" cy="120" r="44" fill="#f4ecd4"/>
  <circle cx="1280" cy="108" r="36" fill="url(#ssky)"/>
  <g fill="#e8e6f0" opacity="0.8">
    <circle cx="200" cy="90" r="3"/><circle cx="360" cy="150" r="2"/><circle cx="520" cy="70" r="3"/>
    <circle cx="700" cy="130" r="2"/><circle cx="900" cy="80" r="3"/><circle cx="1100" cy="160" r="2"/>
    <circle cx="1480" cy="220" r="3"/><circle cx="80" cy="200" r="2"/>
  </g>

  <!-- 遠方城市剪影 -->
  <path d="M0 520 h120 v-140 h80 v70 h90 v-180 h80 v120 h100 v-70 h90 v180 h110 v-90 h90 v60 h100 v-140 h90 v170 h110 v-80 h90 v90 h110 v-50 h90 v90 h60 v120 H0 z" fill="#1c2138"/>
  <!-- 大樓上零星的燈 -->
  <g fill="#ffd985" opacity="0.75">
    <rect x="220" y="410" width="12" height="10"/><rect x="244" y="440" width="12" height="10"/>
    <rect x="390" y="300" width="12" height="10"/><rect x="414" y="330" width="12" height="10"/>
    <rect x="390" y="360" width="12" height="10"/><rect x="700" y="480" width="12" height="10"/>
    <rect x="890" y="360" width="12" height="10"/><rect x="914" y="390" width="12" height="10"/>
    <rect x="1180" y="440" width="12" height="10"/><rect x="1420" y="500" width="12" height="10"/>
  </g>

  <!-- 捷運站入口 -->
  <rect x="1080" y="440" width="420" height="200" rx="10" fill="#24304a"/>
  <rect x="1110" y="480" width="360" height="160" fill="#101828"/>
  <rect x="1080" y="410" width="420" height="52" rx="10" fill="#2f6ea8"/>
  <text x="1290" y="448" font-family="'PingFang TC','Noto Sans TC',sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">捷運站</text>
  <!-- 站口階梯 -->
  <g fill="#324058">
    <rect x="1110" y="600" width="360" height="14"/>
    <rect x="1130" y="570" width="320" height="14"/>
    <rect x="1150" y="540" width="280" height="14"/>
  </g>

  <!-- 主角光環的路燈 -->
  <line x1="430" y1="640" x2="430" y2="180" stroke="#3c4258" stroke-width="16"/>
  <path d="M 430 180 q 90 -10 150 40" fill="none" stroke="#3c4258" stroke-width="14" stroke-linecap="round"/>
  <ellipse cx="590" cy="230" rx="36" ry="18" fill="#ffe9b8"/>
  <polygon points="554,240 626,240 700,640 480,640" fill="#ffe9b8" opacity="0.14"/>
  <!-- 路燈下的光圈（告白聖地） -->
  <ellipse cx="590" cy="660" rx="180" ry="26" fill="#ffe9b8" opacity="0.18"/>

  <!-- 斑馬線 -->
  <g fill="#d8d8e0" opacity="0.7">
    <rect x="80" y="760" width="90" height="30" transform="skewX(-18)"/>
    <rect x="230" y="760" width="90" height="30" transform="skewX(-18)"/>
    <rect x="380" y="760" width="90" height="30" transform="skewX(-18)"/>
    <rect x="530" y="760" width="90" height="30" transform="skewX(-18)"/>
  </g>

  <!-- 路邊的小盆栽與長椅 -->
  <rect x="120" y="590" width="160" height="20" rx="8" fill="#4a4258"/>
  <rect x="140" y="610" width="16" height="40" fill="#3a3648"/>
  <rect x="244" y="610" width="16" height="40" fill="#3a3648"/>
  <rect x="330" y="580" width="70" height="60" rx="8" fill="#4a3826"/>
  <path d="M365 580 q -40 -36 -20 -84 q 26 30 20 84 z" fill="#4a7a55"/>
  <path d="M365 580 q 40 -42 24 -90 q -28 32 -24 90 z" fill="#5a8a63"/>
</svg>
